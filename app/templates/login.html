{% extends "base.html" %}
{% block body %}
<div class="glass-panel" style="max-width:400px; margin:2rem auto; padding:2rem;">
    <h2>用户登录</h2>
    {% if error %}
        <div class="alert error">{{ error }}</div>
    {% end %}
    <form method="post" action="/login">
        {% module xsrf_form_html() %}
        <div><label>用户名：<input type="text" name="username" required></label></div>
        <div><label>密码：<input type="password" name="password" required></label></div>
        <button type="submit">登录</button>
    </form>
    <p>没有账号？<a href="/register">注册</a> · <a href="/admin/login">管理员登录</a></p>
</div>
{% end %}
