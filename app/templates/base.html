<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ project_name }}</title>
    <link rel="stylesheet" href="{{ static_url('css/style.css') }}">
</head>
<body>
    <header>
        <nav class="top-nav">
            <div class="nav-brand"><a href="/">{{ project_name }}</a></div>
            <div class="nav-links">
                {% if current_user %}
                    <a href="/chat">对话</a>
                    <a href="/worker">数字员工</a>
                    <a href="/history">历史</a>
                    <a href="/report">报表</a>
                    <span class="nav-user">{{ current_user.get('username', '') }}</span>
                    <a href="/logout" class="button secondary">退出</a>
                {% else %}
                    <a href="/login" class="button">登录</a>
                    <a href="/register" class="button secondary">注册</a>
                {% end %}
                <a href="/admin/login" class="button ghost">后台</a>
            </div>
        </nav>
    </header>
    <main>
        {% block body %}{% end %}
    </main>
    <script src="{{ static_url('js/app.js') }}"></script>
</body>
</html>
